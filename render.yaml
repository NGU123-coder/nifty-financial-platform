services:
  - type: web
    name: nifty-financial-web
    plan: free
    env: python
    buildCommand: "pip install -r requirements.txt && python web_api/manage.py collectstatic --noinput"
    preDeployCommand: "bash scripts/render_deploy.sh"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --chdir web_api --timeout 120 --workers 3 core.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nifty-financial-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nifty-financial-cache
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHONPATH
        value: /opt/render/project/src/web_api:/opt/render/project/src
      - key: PYTHON_VERSION
        value: 3.12.3

databases:
  - name: nifty-financial-db
    plan: free

redis:
  - name: nifty-financial-cache
    plan: free
