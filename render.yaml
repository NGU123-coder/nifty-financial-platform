services:
  web:
    plan: free
    type: web
    name: nifty-financial-web
    env: python
    buildCommand: "pip install -r requirements.txt && python web_api/manage.py collectstatic --noinput && python web_api/manage.py migrate"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --chdir web_api core.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nifty-financial-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nifty-financial-cache
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHONPATH
        value: /opt/render/project/src/web_api

  worker:
    plan: free
    type: worker
    name: nifty-financial-worker
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd web_api && celery -A core worker -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nifty-financial-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nifty-financial-cache
          property: connectionString
      - key: PYTHONPATH
        value: /opt/render/project/src/web_api

  beat:
    plan: free
    type: worker
    name: nifty-financial-beat
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd web_api && celery -A core beat -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nifty-financial-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nifty-financial-cache
          property: connectionString
      - key: PYTHONPATH
        value: /opt/render/project/src/web_api

databases:
  - name: nifty-financial-db
    plan: free

redis:
  - name: nifty-financial-cache
    plan: free
