apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: nifty-web:latest # Replace with your actual image
        command: ["sh", "-c", "cd /app/web_api && celery -A core worker --loglevel=info"]
        envFrom:
        - configMapRef:
            name: nifty-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nifty-secrets
              key: DB_PASSWORD
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: nifty-secrets
              key: SECRET_KEY
        - name: DATABASE_URL
          value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
        volumeMounts:
        - name: data-storage
          mountPath: /app/data
      volumes:
      - name: data-storage
        persistentVolumeClaim:
          claimName: data-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
spec:
  replicas: 1
  strategy:
    type: Recreate # Important for beat to avoid duplicates
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
      - name: celery-beat
        image: nifty-web:latest # Replace with your actual image
        command: ["sh", "-c", "cd /app/web_api && celery -A core beat --loglevel=info"]
        envFrom:
        - configMapRef:
            name: nifty-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nifty-secrets
              key: DB_PASSWORD
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: nifty-secrets
              key: SECRET_KEY
        - name: DATABASE_URL
          value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
        volumeMounts:
        - name: data-storage
          mountPath: /app/data
      volumes:
      - name: data-storage
        persistentVolumeClaim:
          claimName: data-pvc
